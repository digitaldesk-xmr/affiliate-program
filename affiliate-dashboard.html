<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Affiliato</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);color:#1a1a2e}
        .container{max-width:1200px;margin:0 auto;padding:0 24px}
        .navbar{background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);padding:16px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .logo{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;background-clip:text;color:transparent}
        .nav-links{display:flex;gap:24px;align-items:center}
        .nav-links a{text-decoration:none;color:#1e293b;font-weight:500}
        .btn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:10px 20px;border-radius:40px;border:none;cursor:pointer}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:40px 0}
        .stat-card,.product-card{background:white;padding:24px;border-radius:24px}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;margin:40px 0}
        .affiliate-link{background:#f1f5f9;padding:12px;border-radius:16px;margin-top:12px;word-break:break-all}
        input{width:100%;padding:12px;border-radius:16px;border:1px solid #cbd5e1;margin:10px 0}
        .alert-success{background:#dcfce7;color:#166534;padding:12px;border-radius:16px}
        footer{text-align:center;padding:40px;color:white}
        @media (max-width:768px){.navbar{flex-direction:column}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MarketHub<span style="color:#2a5298">Affiliates</span></div>
        <div class="nav-links">
            <span id="userGreeting">👋 Ciao</span>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1>📊 La tua dashboard</h1>

        <div class="stats-grid">
            <div class="stat-card"><h3>Click totali</h3><div id="total-clicks">0</div></div>
            <div class="stat-card"><h3>Conversioni</h3><div id="total-conversions">0</div></div>
            <div class="stat-card"><h3>Guadagni</h3><div id="total-earnings">€0</div></div>
            <div class="stat-card"><h3>Commissione</h3><div id="commission-rate">0%</div></div>
        </div>

        <div class="stat-card">
            <h3>💰 Il tuo wallet crypto</h3>
            <input type="text" id="crypto_wallet" placeholder="Indirizzo wallet (USDT/BTC/ETH)">
            <button id="updateWalletBtn" class="btn">Aggiorna wallet</button>
            <div id="walletMessage"></div>
        </div>

        <h2>📦 Prodotti da promuovere</h2>
        <div id="productsContainer" class="products-grid">Caricamento...</div>
    </div>

    <footer>© 2025 MarketHub Affiliates – Pagamenti in criptovalute</footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wwhagqzbqydicoyvrbjo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_eyYrHU1K4-SD9bgC37S2rw_jpwCywRD';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const API_BASE = window.location.origin + '/api';
        let currentUser = null;

        async function getToken() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return null; }
            return session.access_token;
        }

        async function fetchAPI(endpoint, options = {}) {
            const token = await getToken();
            if (!token) return null;
            const res = await fetch(`${API_BASE}/${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...options.headers }
            });
            if (res.status === 401) { window.location.href = 'login.html'; return null; }
            return res.json();
        }

        async function loadStats() {
            const data = await fetchAPI('affiliate-stats');
            if (data) {
                document.getElementById('total-clicks').innerText = data.total_clicks || 0;
                document.getElementById('total-conversions').innerText = data.total_conversions || 0;
                document.getElementById('total-earnings').innerText = `€${(data.total_earnings || 0).toFixed(2)}`;
                document.getElementById('commission-rate').innerText = `${data.commission_rate || 0}%`;
                if (data.crypto_wallet) document.getElementById('crypto_wallet').value = data.crypto_wallet;
            }
        }

        async function loadProducts() {
            const products = await fetch(`${API_BASE}/affiliate-list-products`).then(r => r.json());
            const container = document.getElementById('productsContainer');
            if (!products.length) { container.innerHTML = '<div class="stat-card">❌ Nessun prodotto attivo</div>'; return; }
            container.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3>${p.name}</h3>
                    <p>${p.description || ''}</p>
                    <p class="commission">💰 Commissione: ${p.default_commission_rate}%</p>
                    <button class="btn" data-id="${p.id}">🔗 Genera link Telegram</button>
                    <div class="affiliate-link" id="link-${p.id}" style="display:none;">
                        <input type="text" readonly id="input-${p.id}" style="width:100%;" onclick="this.select();">
                        <button class="btn" style="margin-top:8px;" data-copy="${p.id}">Copia link</button>
                    </div>
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('.product-card .btn[data-id]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const productId = btn.dataset.id;
                    btn.innerText = '⏳...';
                    const data = await fetchAPI('affiliate-generate-link', { method: 'POST', body: JSON.stringify({ productId }) });
                    if (data?.success) {
                        const div = document.getElementById(`link-${productId}`);
                        const input = document.getElementById(`input-${productId}`);
                        input.value = data.affiliateUrl;
                        div.style.display = 'block';
                    }
                    btn.innerText = '🔗 Genera link Telegram';
                });
            });

            document.querySelectorAll('[data-copy]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.copy;
                    const input = document.getElementById(`input-${id}`);
                    input.select();
                    document.execCommand('copy');
                    alert('Link copiato negli appunti! Condividilo su Telegram');
                });
            });
        }

        document.getElementById('updateWalletBtn').addEventListener('click', async () => {
            const data = await fetchAPI('affiliate-update-wallet', { method: 'POST', body: JSON.stringify({ crypto_wallet: document.getElementById('crypto_wallet').value }) });
            document.getElementById('walletMessage').innerHTML = data?.success ? '<div class="alert-success">✅ Wallet aggiornato!</div>' : '<div class="alert-error">❌ Errore</div>';
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); window.location.href = 'login.html'; });

        loadStats();
        loadProducts();
    </script>
</body>
</html>
