<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);color:#1a1a2e}
        .container{max-width:1400px;margin:0 auto;padding:20px}
        .navbar{background:rgba(255,255,255,0.95);padding:16px 32px;display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;background-clip:text;color:transparent}
        .card{background:white;border-radius:24px;padding:20px;margin-bottom:30px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #e2e8f0}
        th{background:#f8fafc}
        .btn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:8px 16px;border-radius:30px;border:none;cursor:pointer}
        input,select{width:100%;padding:10px;border-radius:16px;border:1px solid #cbd5e1;margin:8px 0}
        .product-form{display:grid;gap:12px;margin-bottom:20px}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Admin<span style="color:#2a5298">Panel</span></div>
        <div class="nav-links"><a href="index.html" style="color:#1e293b;text-decoration:none">Home</a><button id="logoutBtn" class="btn">Logout</button></div>
    </nav>
    <div class="container">
        <h1>Dashboard Admin</h1>

        <div class="card">
            <h2>📦 Prodotti</h2>
            <button id="newProductBtn" class="btn">+ Nuovo Prodotto</button>
            <div id="productForm" class="product-form" style="display:none; margin-top:15px;">
                <input type="text" id="prod_name" placeholder="Nome prodotto">
                <input type="text" id="prod_desc" placeholder="Descrizione">
                <input type="number" id="prod_commission" placeholder="Commissione %" step="any">
                <input type="text" id="prod_url" placeholder="URL base">
                <button id="saveProductBtn" class="btn">Salva</button>
            </div>
            <table id="productsTable"><thead><tr><th>Nome</th><th>Commissione</th><th>URL</th><th>Azioni</th></tr></thead><tbody></tbody></table>
        </div>

        <div class="card">
            <h2>👥 Affiliati Iscritti</h2>
            <table id="affiliatesTable"><thead><tr><th>Nome</th><th>Email</th><th>Codice</th><th>Wallet</th><th>Guadagni</th><th>Da Pagare</th></tr></thead><tbody></tbody></table>
        </div>

        <div class="card">
            <h2>💰 Conversioni</h2>
            <table id="conversionsTable"><thead><tr><th>Affiliato</th><th>Prodotto</th><th>Importo</th><th>Commissione</th><th>Status</th><th>Data</th><th>Azioni</th></tr></thead><tbody></tbody></table>
        </div>

        <div class="card">
            <h2>💸 Paga in Criptovaluta</h2>
            <select id="pay_affiliate_id"><option value="">Scegli affiliato</option></select>
            <select id="pay_conversion_ids" multiple size="4"></select>
            <input type="number" id="pay_amount" placeholder="Importo USD">
            <input type="text" id="pay_crypto_currency" placeholder="USDT/BTC/ETH">
            <input type="number" id="pay_crypto_amount" placeholder="Importo cripto">
            <button id="executePaymentBtn" class="btn">Registra Pagamento</button>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        const ADMIN_KEY = 'admin-key-123';

        async function fetchAPI(url) {
            const res = await fetch(`${API_BASE}/${url}`, { headers: { 'x-admin-key': ADMIN_KEY } });
            return res.json();
        }

        async function loadProducts() {
            const products = await fetchAPI('admin-list-products');
            const tbody = document.querySelector('#productsTable tbody');
            tbody.innerHTML = '';
            products.forEach(p => {
                tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.default_commission_rate}%</td><td>${p.base_url}</td><td><button onclick="deleteProduct('${p.id}')">🗑️</button></td></tr>`;
            });
        }

        async function loadAffiliates() {
            const affiliates = await fetchAPI('admin-list-affiliates');
            const tbody = document.querySelector('#affiliatesTable tbody');
            tbody.innerHTML = '';
            affiliates.forEach(a => {
                const pending = (a.total_earnings || 0) - (a.paid_earnings || 0);
                tbody.innerHTML += `<tr><td>${a.name || '-'}</td><td>${a.email}</td><td>${a.unique_code}</td><td>${a.crypto_wallet || '-'}</td><td>€${a.total_earnings || 0}</td><td>€${pending}</td></tr>`;
            });
        }

        async function loadConversions() {
            const conversions = await fetchAPI('admin-list-conversions');
            const tbody = document.querySelector('#conversionsTable tbody');
            tbody.innerHTML = '';
            conversions.forEach(c => {
                tbody.innerHTML += `<tr>
                    <td>${c.affiliate?.name || c.affiliate?.email}</td>
                    <td>${c.product?.name || '-'}</td>
                    <td>€${c.amount}</td>
                    <td>€${c.commission}</td>
                    <td class="status-${c.status}">${c.status}</td>
                    <td>${new Date(c.created_at).toLocaleDateString()}</td>
                    <td>${c.status === 'pending' ? `<button class="btn" onclick="approve('${c.id}','${c.affiliate_id}',${c.commission})">Approva</button>` : '-'}</td>
                </tr>`;
            });
        }

        window.approve = async (id, affId, commission) => {
            await fetch(`${API_BASE}/admin-approve-conversion`, { method:'POST', headers:{'x-admin-key':ADMIN_KEY,'Content-Type':'application/json'}, body:JSON.stringify({ conversionId:id, affiliateId:affId, commission }) });
            loadConversions(); loadAffiliates();
        };
        window.deleteProduct = async (id) => { await fetch(`${API_BASE}/admin-delete-product?id=${id}`, { method:'DELETE', headers:{'x-admin-key':ADMIN_KEY} }); loadProducts(); };

        document.getElementById('saveProductBtn').addEventListener('click', async () => {
            await fetch(`${API_BASE}/admin-create-product`, { method:'POST', headers:{'x-admin-key':ADMIN_KEY,'Content-Type':'application/json'}, body:JSON.stringify({ name:document.getElementById('prod_name').value, description:document.getElementById('prod_desc').value, default_commission_rate:parseFloat(document.getElementById('prod_commission').value), base_url:document.getElementById('prod_url').value, is_active:true }) });
            document.getElementById('productForm').style.display='none';
            loadProducts();
        });
        document.getElementById('newProductBtn').onclick = () => document.getElementById('productForm').style.display='block';
        document.getElementById('logoutBtn').onclick = () => window.location.href = 'index.html';

        async function loadAffiliatesForPayment() {
            const affiliates = await fetchAPI('admin-list-affiliates');
            const select = document.getElementById('pay_affiliate_id');
            select.innerHTML = '<option value="">Scegli affiliato</option>';
            affiliates.forEach(a => { select.innerHTML += `<option value="${a.id}">${a.name || a.email} - ${a.crypto_wallet ? '✅' : '❌'}</option>`; });
        }
        document.getElementById('pay_affiliate_id').addEventListener('change', async (e) => {
            const affId = e.target.value;
            if (!affId) return;
            const res = await fetch(`${API_BASE}/admin-affiliate-conversions?affiliateId=${affId}&status=approved`, { headers: { 'x-admin-key': ADMIN_KEY } });
            const conversions = await res.json();
            const select = document.getElementById('pay_conversion_ids');
            select.innerHTML = '';
            conversions.forEach(c => { select.innerHTML += `<option value="${c.id}">€${c.commission} - ${c.order_id}</option>`; });
        });
        document.getElementById('executePaymentBtn').addEventListener('click', async () => {
            const affiliateId = document.getElementById('pay_affiliate_id').value;
            const selected = Array.from(document.getElementById('pay_conversion_ids').selectedOptions).map(opt => opt.value);
            const amount = parseFloat(document.getElementById('pay_amount').value);
            const crypto_currency = document.getElementById('pay_crypto_currency').value;
            const crypto_amount = parseFloat(document.getElementById('pay_crypto_amount').value);
            if (!affiliateId || selected.length === 0 || isNaN(amount)) return alert('Compila tutti i campi');
            const res = await fetch(`${API_BASE}/admin-update-payment`, { method:'POST', headers:{'x-admin-key':ADMIN_KEY,'Content-Type':'application/json'}, body:JSON.stringify({ affiliateId, conversionIds:selected, amount, crypto_currency, crypto_amount }) });
            if (res.ok) { alert('Pagamento registrato!'); loadConversions(); loadAffiliates(); }
            else alert('Errore');
        });

        loadProducts(); loadAffiliates(); loadConversions(); loadAffiliatesForPayment();
    </script>
</body>
</html>
