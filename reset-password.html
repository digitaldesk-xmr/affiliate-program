<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="max-width: 500px; margin: 100px auto;">
        <div class="card">
            <h2>Reimposta password</h2>
            <form id="reset-form">
                <div class="form-group">
                    <input type="password" id="password" placeholder="Nuova password" required>
                </div>
                <div class="form-group">
                    <input type="password" id="confirm_password" placeholder="Conferma password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Aggiorna password</button>
            </form>
            <div id="message"></div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const access_token = urlParams.get('access_token');

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            if (password !== confirm) {
                document.getElementById('message').innerHTML = '<div class="alert alert-error">Le password non coincidono</div>';
                return;
            }
            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ access_token, new_password: password })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('message').innerHTML = '<div class="alert alert-success">Password aggiornata! <a href="affiliate-dashboard.html">Accedi</a></div>';
            } else {
                document.getElementById('message').innerHTML = '<div class="alert alert-error">' + data.error + '</div>';
            }
        });
    </script>
</body>
</html>
