<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Affiliato</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container" style="max-width: 500px; margin: 100px auto;">
        <div class="card">
            <h2>🔐 Login Affiliato</h2>
            <form id="login-form">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Accedi</button>
            </form>
            <div id="message"></div>
            <p class="text-center" style="margin-top: 20px;">
                Non hai un account? <a href="register.html">Registrati</a><br>
                <a href="reset-password.html">Password dimenticata?</a>
            </p>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://il-tuo-progetto.supabase.co';
        const SUPABASE_ANON_KEY = 'la-tua-chiave-anon';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                document.getElementById('message').innerHTML = `<div class="alert alert-error">${error.message}</div>`;
            } else {
                // Salva la sessione e reindirizza
                localStorage.setItem('affiliate_session', JSON.stringify(data.session));
                window.location.href = 'affiliate-dashboard.html';
            }
        });
    </script>
</body>
</html>
